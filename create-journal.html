<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create journal</title>
</head>

<body>
    <h1> Creating Journal </h1>
    <form action="api/v1/journals" method="POST">
        <label for="main-title">Journal Title</label>
        <input id="main-title" type="text" name="journal-title" placeholder="Journal Title">
        <br>
        <label for="journal-entry">Journal Entry</label>
        <textarea id="journal-entry" name="entry" cols="30" rows="5"></textarea>

        <br>
        <label for="journal-category">Category</label>
        <select name="category" id="journal-category">
            <option value="personal">Personal</option>
            <option value="work">Work</option>
            <option value="other">Other</option>
            <option value="PBI">PBI</option>
            <option value="Meeting">Meeting</option>
            <option value="Task">Task</option>
        </select>
        <br>
        
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
</body>

</html>
